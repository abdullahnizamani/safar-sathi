openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: SafarSathi carpooling API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: rides
    description: Ride operations
  - name: requests
    description: Ride request operations
  - name: reviews
    description: Review and rating operations
  - name: stats
    description: Statistics and summary operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unauthorized

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: OK

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user profile
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized

  /auth/profile:
    patch:
      operationId: updateProfile
      tags: [auth]
      summary: Update current user profile (avatar etc.)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
    delete:
      operationId: deleteAccount
      tags: [auth]
      summary: Close/delete current user account
      responses:
        "200":
          description: Account closed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "401":
          description: Unauthorized

  /rides:
    get:
      operationId: listRides
      tags: [rides]
      summary: List open rides feed
      parameters:
        - name: origin
          in: query
          schema:
            type: string
        - name: destination
          in: query
          schema:
            type: string
        - name: gender_preference
          in: query
          schema:
            type: string
            enum: [ANY, MALE, FEMALE]
        - name: date
          in: query
          description: Filter by departure date (YYYY-MM-DD)
          schema:
            type: string
        - name: origin_lat
          in: query
          description: Search origin latitude for proximity sort
          schema:
            type: number
        - name: origin_lng
          in: query
          description: Search origin longitude for proximity sort
          schema:
            type: number
        - name: dest_lat
          in: query
          description: Search destination latitude for proximity sort
          schema:
            type: number
        - name: dest_lng
          in: query
          description: Search destination longitude for proximity sort
          schema:
            type: number
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ride"

    post:
      operationId: createRide
      tags: [rides]
      summary: Post a new ride
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RideInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ride"
        "400":
          description: Bad request

  /rides/my:
    get:
      operationId: listMyRides
      tags: [rides]
      summary: List rides posted by the current user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ride"

  /rides/{id}:
    get:
      operationId: getRide
      tags: [rides]
      summary: Get ride details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ride"
        "404":
          description: Not found

    patch:
      operationId: updateRide
      tags: [rides]
      summary: Update a ride (driver only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RideUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ride"
        "404":
          description: Not found

    delete:
      operationId: deleteRide
      tags: [rides]
      summary: Cancel a ride (driver only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: No content

  /rides/{id}/requests:
    get:
      operationId: listRideRequests
      tags: [requests]
      summary: List requests for a specific ride (driver only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RideRequest"

  /requests:
    post:
      operationId: createRideRequest
      tags: [requests]
      summary: Request a seat on a ride
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RideRequestInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RideRequest"
        "400":
          description: Bad request

  /requests/my:
    get:
      operationId: listMyRequests
      tags: [requests]
      summary: List ride requests made by the current user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RideRequest"

  /requests/{id}:
    patch:
      operationId: updateRideRequest
      tags: [requests]
      summary: Accept or reject a ride request (driver only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RideRequestUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RideRequest"
        "404":
          description: Not found

  /reviews:
    post:
      operationId: createReview
      tags: [reviews]
      summary: Submit a review for a driver
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
        "400":
          description: Bad request

  /users/{id}/reviews:
    get:
      operationId: getUserReviews
      tags: [reviews]
      summary: Get a user's received reviews and average rating
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserReviews"

  /stats/summary:
    get:
      operationId: getStatsSummary
      tags: [stats]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsSummary"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    RegisterInput:
      type: object
      required: [username, password, email, phone_number, university, gender]
      properties:
        username:
          type: string
          minLength: 3
        password:
          type: string
          minLength: 6
        email:
          type: string
        phone_number:
          type: string
        university:
          type: string
        gender:
          type: string
          enum: [M, F, O]

    LoginInput:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/UserProfile"
        token:
          type: string

    UserProfile:
      type: object
      required: [id, username, email, phone_number, university, gender]
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        phone_number:
          type: string
        university:
          type: string
        gender:
          type: string
          enum: [M, F, O]
        avatar_url:
          type: ["string", "null"]
        created_at:
          type: string

    UpdateProfileInput:
      type: object
      properties:
        avatar_url:
          type: ["string", "null"]
        phone_number:
          type: string
        email:
          type: string
        university:
          type: string

    Ride:
      type: object
      required: [id, driver_id, driver_name, origin, destination, departure_time, available_seats, fare, transport_type, gender_preference, status, created_at]
      properties:
        id:
          type: integer
        driver_id:
          type: integer
        driver_name:
          type: string
        driver_university:
          type: string
        driver_avg_rating:
          type: ["number", "null"]
        origin:
          type: string
        destination:
          type: string
        origin_lat:
          type: ["number", "null"]
        origin_lng:
          type: ["number", "null"]
        dest_lat:
          type: ["number", "null"]
        dest_lng:
          type: ["number", "null"]
        departure_time:
          type: string
        available_seats:
          type: integer
        fare:
          type: integer
        transport_type:
          type: string
        gender_preference:
          type: string
          enum: [ANY, MALE, FEMALE]
        status:
          type: string
          enum: [OPEN, FULL, COMPLETED, CANCELLED]
        request_count:
          type: integer
        notes:
          type: ["string", "null"]
        created_at:
          type: string

    RideInput:
      type: object
      required: [origin, destination, departure_time, available_seats, fare]
      properties:
        origin:
          type: string
          minLength: 1
        destination:
          type: string
          minLength: 1
        origin_lat:
          type: ["number", "null"]
        origin_lng:
          type: ["number", "null"]
        dest_lat:
          type: ["number", "null"]
        dest_lng:
          type: ["number", "null"]
        departure_time:
          type: string
        available_seats:
          type: integer
          minimum: 1
        fare:
          type: integer
          minimum: 0
        transport_type:
          type: string
        gender_preference:
          type: string
          enum: [ANY, MALE, FEMALE]
        notes:
          type: string

    RideUpdate:
      type: object
      properties:
        origin:
          type: string
        destination:
          type: string
        origin_lat:
          type: ["number", "null"]
        origin_lng:
          type: ["number", "null"]
        dest_lat:
          type: ["number", "null"]
        dest_lng:
          type: ["number", "null"]
        departure_time:
          type: string
        available_seats:
          type: integer
        fare:
          type: integer
        transport_type:
          type: string
        gender_preference:
          type: string
          enum: [ANY, MALE, FEMALE]
        status:
          type: string
          enum: [OPEN, FULL, COMPLETED, CANCELLED]

    RideRequest:
      type: object
      required: [id, ride_id, rider_id, rider_name, requested_seats, status, created_at]
      properties:
        id:
          type: integer
        ride_id:
          type: integer
        rider_id:
          type: integer
        rider_name:
          type: string
        rider_university:
          type: string
        rider_gender:
          type: string
        requested_seats:
          type: integer
        status:
          type: string
          enum: [PENDING, ACCEPTED, REJECTED, CANCELLED]
        driver_phone:
          type: ["string", "null"]
          description: Revealed to the rider only when request is ACCEPTED
        rider_phone:
          type: ["string", "null"]
          description: Revealed to the driver only when request is ACCEPTED
        ride:
          $ref: "#/components/schemas/Ride"
        reviewed:
          type: boolean
        created_at:
          type: string
        updated_at:
          type: string

    RideRequestInput:
      type: object
      required: [ride_id]
      properties:
        ride_id:
          type: integer
        requested_seats:
          type: integer
          default: 1

    RideRequestUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ACCEPTED, REJECTED, CANCELLED]

    Review:
      type: object
      required: [id, reviewer_id, reviewer_name, driver_id, ride_id, rating, created_at]
      properties:
        id:
          type: integer
        reviewer_id:
          type: integer
        reviewer_name:
          type: string
        driver_id:
          type: integer
        ride_id:
          type: integer
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: ["string", "null"]
        created_at:
          type: string

    ReviewInput:
      type: object
      required: [driver_id, ride_id, rating]
      properties:
        driver_id:
          type: integer
        ride_id:
          type: integer
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string

    UserReviews:
      type: object
      required: [user_id, avg_rating, review_count, reviews]
      properties:
        user_id:
          type: integer
        avg_rating:
          type: ["number", "null"]
        review_count:
          type: integer
        reviews:
          type: array
          items:
            $ref: "#/components/schemas/Review"

    StatsSummary:
      type: object
      required: [total_open_rides, total_seats_available, my_rides_count, my_requests_count, my_pending_requests]
      properties:
        total_open_rides:
          type: integer
        total_seats_available:
          type: integer
        my_rides_count:
          type: integer
        my_requests_count:
          type: integer
        my_pending_requests:
          type: integer
        popular_routes:
          type: array
          items:
            $ref: "#/components/schemas/PopularRoute"

    PopularRoute:
      type: object
      required: [origin, destination, count]
      properties:
        origin:
          type: string
        destination:
          type: string
        count:
          type: integer
